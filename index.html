    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(30, 1fr);
            gap: 1px;
            background-color: #cbd5e1;
            border: 4px solid #334155;
            aspect-ratio: 1.2 / 1;
        }
        .cell { background-color: white; position: relative; }
        .cell.wall { background-color: #94a3b8; } 
        .cell.start { background-color: #ef4444; color: white; display: flex; align-items: center; justify-content: center; z-index: 20;}
        .cell.end { background-color: #22c55e; color: white; display: flex; align-items: center; justify-content: center; z-index: 20;}
        .cell.area-a { background-color: #a855f7; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; z-index: 10; }
        .cell.item-shelf { color: #334155; font-weight: bold; font-size: 10px; }
        
        /* 貨架狀態 */
        .cell.shelf-orange { background-color: #f97316 !important; color: white; }
        .cell.shelf-red-glow { 
            background-color: #ef4444 !important; 
            color: white;
            animation: redGlow 1s infinite alternate;
        }
        @keyframes redGlow {
            from { box-shadow: inset 0 0 2px #ef4444; }
            to { box-shadow: inset 0 0 12px #7f1d1d, 0 0 8px #ef4444; }
        }

        /* 步進箭頭與樣式 */
        .path-arrow {
            position: absolute;
            font-size: 10px;
            font-weight: 900;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .path-arrow.hidden-here { visibility: hidden; }
        .path-arrow.past { opacity: 0.1 !important; }
        .path-arrow.future { opacity: 1; }

        /* 小人樣式 */
        .walker {
            color: #1d4ed8;
            font-size: 20px;
            z-index: 30;
            animation: walkerBounce 0.5s infinite alternate;
        }
        @keyframes walkerBounce {
            from { transform: translateY(0); }
            to { transform: translateY(-2px); }
        }
    </style>
</head>

        function initMap() {
            const gridEl = document.getElementById('map-grid');
            gridEl.innerHTML = '';

            for(let x=4; x<28; x+=4) {

            }

            items.forEach(i => { mapData[i.y][i.x] = 1; });

                    const cell = document.createElement('div');
                    cell.className = 'cell flex items-center justify-center';
                    cell.id = `cell-${x}-${y}`;
                    
                    if (x === areaAPos.x && y === areaAPos.y) {
                        cell.classList.add('area-a');
                        cell.innerText = 'A區';
                        cell.title = '估價區';
                    } else if (x === startPos.x && y === startPos.y) {
                        cell.classList.add('start');
                        cell.innerHTML = '<i class="fas fa-door-open text-[10px]"></i>';
                    } else if (x === endPos.x && y === endPos.y) {
                        cell.classList.add('end');
                        cell.innerHTML = '<i class="fas fa-cash-register text-[10px]"></i>';
                    } else if (mapData[y][x] === 1) {
                        cell.classList.add('wall', 'item-shelf');
                        const matchedItem = items.find(i => i.x === x && i.y === y);
                        if(matchedItem) {

                            cell.title = matchedItem.name;

                    }
                    gridEl.appendChild(cell);
                }
            }
            renderCheckList();
            setupSearchEngine();
        }

        function renderCheckList() {
            const listEl = document.getElementById('item-list');
            listEl.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.id = `list-item-${item.id}`;
                div.className = "flex items-center p-2 bg-slate-50 hover:bg-white rounded-lg cursor-pointer transition-all border border-slate-100 group";
                div.innerHTML = `
                    <div class="w-4 h-4 border-2 border-slate-300 rounded mr-2 flex items-center justify-center checkbox-ui transition-all">
                        <i class="fas fa-check text-white text-[8px] hidden"></i>
                    </div>
                    <span class="font-bold text-slate-400 mr-1 w-4">${item.id}</span>
                    <span class="text-slate-700 font-medium">${item.name}</span>
                `;
                div.onclick = () => toggleItemSelection(item.id);
                listEl.appendChild(div);
            });
        }

        function toggleItemSelection(id) {
            const item = items.find(i => i.id === id);
            if(!item) return;
            const listEl = document.getElementById(`list-item-${id}`);
            const checkbox = listEl.querySelector('.checkbox-ui');
            const checkIcon = checkbox.querySelector('i');
            const shelfCell = document.getElementById(`cell-${item.x}-${item.y}`);

            if (selectedIds.has(id)) {
                selectedIds.delete(id);
                checkbox.classList.remove('bg-orange-500', 'border-orange-500');
                checkIcon.classList.add('hidden');
                shelfCell.classList.remove('shelf-orange', 'shelf-red-glow');
            } else {
                selectedIds.add(id);
                checkbox.classList.add('bg-orange-500', 'border-orange-500');
                checkIcon.classList.remove('hidden');
                shelfCell.classList.add('shelf-orange');
            }
            resetNavigationState();
        }

        // 優化後的搜尋與聯想列表功能：支援同字開頭跳轉至不同貨架區
        function setupSearchEngine() {
            const input = document.getElementById('search-input');
            const sugBox = document.getElementById('search-suggestions');

            input.oninput = () => {
                const val = input.value.trim().toLowerCase();
                sugBox.innerHTML = '';
                if (!val) { sugBox.classList.add('hidden'); return; }

                // 搜尋細項資料庫中所有開頭或包含該關鍵字的項目
                const matches = searchKeywordsPool.filter(k => k.display.toLowerCase().includes(val));

                if (matches.length === 0) {
                    sugBox.innerHTML = `<div class="p-3 text-xs text-slate-400 italic">查無對應商品</div>`;
                } else {
                    matches.forEach(match => {
                        const targetArea = items.find(i => i.id === match.targetId);
                        const row = document.createElement('div');
                        row.className = "p-2.5 text-xs hover:bg-slate-50 cursor-pointer font-medium text-slate-700 border-b border-slate-50 flex justify-between items-center";
                        row.innerHTML = `
                            <span>${match.display}</span>
                            <span class="bg-slate-100 text-[9px] px-1.5 py-0.5 rounded text-slate-500">導向: ${targetArea.name}</span>
                        `;
                        row.onclick = () => {
                            if (!selectedIds.has(match.targetId)) {
                                toggleItemSelection(match.targetId);
                            }
                            input.value = '';
                            sugBox.classList.add('hidden');
                        };
                        sugBox.appendChild(row);
                    });
                }
                sugBox.classList.remove('hidden');
            };

            document.addEventListener('click', (e) => {
                if (e.target !== input) sugBox.classList.add('hidden');
            });
        }

        function aStarSearch(start, end) {
            const openSet = [start];
            const cameFrom = {};
            const gScore = {}, fScore = {};
            const key = (p) => `${p.x},${p.y}`;
            
            gScore[key(start)] = 0;
            fScore[key(start)] = Math.abs(start.x - end.x) + Math.abs(start.y - end.y);

            while (openSet.length > 0) {
                let current = openSet.reduce((a, b) => fScore[key(a)] < fScore[key(b)] ? a : b);
                if (current.x === end.x && current.y === end.y) {
                    const path = [];
                    while (key(current) in cameFrom) {
                        path.push(current);
                        current = cameFrom[key(current)];
                    }
                    return path.reverse();
                }
                openSet.splice(openSet.indexOf(current), 1);
                
                const neighbors = [
                    {x: current.x+1, y: current.y}, {x: current.x-1, y: current.y},
                    {x: current.x, y: current.y+1}, {x: current.x, y: current.y-1}
                ].filter(n => n.x >= 0 && n.x < COLS && n.y >= 0 && n.y < ROWS && mapData[n.y][n.x] === 0);

                for (let n of neighbors) {
                    let tg = gScore[key(current)] + 1;
                    if (tg < (gScore[key(n)] ?? Infinity)) {
                        cameFrom[key(n)] = current;
                        gScore[key(n)] = tg;
                        fScore[key(n)] = tg + Math.abs(n.x - end.x) + Math.abs(n.y - end.y);
                        if (!openSet.find(o => o.x === n.x && o.y === n.y)) openSet.push(n);
                    }
                }
            }
            return [];
        }

        function getPermutations(array) {
            if (array.length <= 1) return [array];
            let perms = [];
            for (let i = 0; i < array.length; i++) {
                let rest = getPermutations(array.slice(0, i).concat(array.slice(i + 1)));
                for (let r of rest) perms.push([array[i], ...r]);
            }
            return perms;
        }

        function resetNavigationState() {
            globalNavigationPath = [];
            currentWalkerIndex = 0;

            promoHistory = [];
            renderPromoHistory();
            
            document.querySelectorAll('.path-arrow').forEach(a => a.remove());
            const walker = document.getElementById('user-walker');
            if(walker) walker.remove();
            document.getElementById('stats').classList.add('hidden');
            document.getElementById('alert-bar').className = "min-h-[50px] flex items-center justify-between bg-slate-800 text-white px-4 py-2 rounded-xl shadow-md";
            document.getElementById('alert-text').innerHTML = `<i class="fas fa-info-circle text-blue-400"></i> <span>請選擇商品並點擊規劃路線。</span>`;
            document.getElementById('promo-trigger-zone').innerHTML = '';
            items.forEach(i => {
                const cell = document.getElementById(`cell-${i.x}-${i.y}`);
                if (cell) {
                    cell.classList.remove('shelf-red-glow');
                    if(selectedIds.has(i.id)) cell.classList.add('shelf-orange');
                }
            });
        }

        document.getElementById('btn-generate').onclick = () => {
            resetNavigationState();
            if (selectedIds.size === 0) return;

            const pool = Array.from(selectedIds).map(id => items.find(i => i.id === id));
            const perms = getPermutations(pool);
            
            let bestFullPathData = null;
            let minTotalDist = Infinity;
            let bestSegmentMeta = [];

            perms.forEach(order => {
                let currentPos = startPos;
                let accumulatedPath = [];
                let totalDist = 0;
                let segments = [];

                order.forEach((targetShelf) => {
                    const neighbors = [
                        {x: targetShelf.x+1, y: targetShelf.y}, {x: targetShelf.x-1, y: targetShelf.y},
                        {x: targetShelf.x, y: targetShelf.y+1}, {x: targetShelf.x, y: targetShelf.y-1}
                    ].filter(n => n.x >= 0 && n.x < COLS && n.y >= 0 && n.y < ROWS && mapData[n.y][n.x] === 0);

                    let bestCheckPoint = neighbors[0];
                    let shortestSub = Infinity;
                    neighbors.forEach(nb => {
                        const d = Math.abs(currentPos.x - nb.x) + Math.abs(currentPos.y - nb.y);
                        if(d < shortestSub) { shortestSub = d; bestCheckPoint = nb; }
                    });

                    const subPath = aStarSearch(currentPos, bestCheckPoint);
                    segments.push({ data: subPath, item: targetShelf });
                    accumulatedPath = accumulatedPath.concat(subPath);
                    totalDist += subPath.length;
                    currentPos = bestCheckPoint;
                });

                const finalSub = aStarSearch(currentPos, endPos);
                segments.push({ data: finalSub, item: { id: '結帳', name: '收銀台' } });
                accumulatedPath = accumulatedPath.concat(finalSub);
                totalDist += finalSub.length;

                if (totalDist < minTotalDist) {
                    minTotalDist = totalDist;
                    bestFullPathData = accumulatedPath;
                    bestSegmentMeta = segments;
                }
            });

            bestSegmentMeta.forEach((seg, sIdx) => {
                const color = segmentColors[sIdx % segmentColors.length];
                seg.data.forEach((coord) => {
                    globalNavigationPath.push({
                        x: coord.x,
                        y: coord.y,
                        color: color,
                        targetItem: seg.item,
                        isLastSeg: sIdx === bestSegmentMeta.length - 1
                    });
                });
            });

            for(let i = 0; i < globalNavigationPath.length - 1; i++) {
                const cur = globalNavigationPath[i];
                const next = globalNavigationPath[i+1];
                const cell = document.getElementById(`cell-${cur.x}-${cur.y}`);
                
                if (cell && !cell.classList.contains('start') && !cell.classList.contains('end')) {
                    let arrowIcon = 'fa-arrow-right';
                    if (next.x > cur.x) arrowIcon = 'fa-arrow-right';
                    else if (next.x < cur.x) arrowIcon = 'fa-arrow-left';
                    else if (next.y > cur.y) arrowIcon = 'fa-arrow-down';
                    else if (next.y < cur.y) arrowIcon = 'fa-arrow-up';

                    const arrowEl = document.createElement('div');
                    arrowEl.className = `path-arrow future`;
                    arrowEl.id = `arrow-${i}`;
                    arrowEl.style.color = cur.color;
                    arrowEl.innerHTML = `<i class="fas ${arrowIcon}"></i>`;
                    cell.appendChild(arrowEl);
                }
            }

            const firstCell = document.getElementById(`cell-${startPos.x}-${startPos.y}`);
            const walkerEl = document.createElement('div');
            walkerEl.id = 'user-walker';
            walkerEl.className = 'walker flex items-center justify-center w-full h-full';
            walkerEl.innerHTML = '<i class="fas fa-walking"></i>';
            firstCell.appendChild(walkerEl);

            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('dist-val').innerText = globalNavigationPath.length;
            document.getElementById('stage-val').innerText = "前往: " + bestSegmentMeta[0].item.name;
            document.getElementById('route-order').innerText = "導航序: 入口 → " + bestSegmentMeta.map(s => s.item.id).join(" → ");
            
            updateSimulationUX();
        };

        // 小人前進一步（手機與空白鍵共用）
function moveWalkerOneStep() {

    if (globalNavigationPath.length === 0 || currentWalkerIndex >= globalNavigationPath.length) return;

    const curArrow = document.getElementById(`arrow-${currentWalkerIndex}`);

    if(curArrow) {
        curArrow.classList.remove('hidden-here', 'future');
        curArrow.classList.add('past');
    }

    currentWalkerIndex++;

    const nextCoord =
        currentWalkerIndex < globalNavigationPath.length
        ? globalNavigationPath[currentWalkerIndex]
        : endPos;

    const nextCell = document.getElementById(`cell-${nextCoord.x}-${nextCoord.y}`);

    const walkerEl = document.getElementById('user-walker');

    if (walkerEl && nextCell) {
        nextCell.appendChild(walkerEl);
    }

    const nextArrow = document.getElementById(`arrow-${currentWalkerIndex}`);

    if(nextArrow) {
        nextArrow.classList.add('hidden-here');
    }

    document.getElementById('dist-val').innerText =
        Math.max(0, globalNavigationPath.length - currentWalkerIndex);

    updateSimulationUX();
}


        window.onkeydown = (e) => {
    if (e.code === 'Space' || e.keyCode === 32) {
        e.preventDefault();
        moveWalkerOneStep();
    }
};

        function updateSimulationUX() {
            if(globalNavigationPath.length === 0) return;
            
            const curStep = currentWalkerIndex < globalNavigationPath.length ? globalNavigationPath[currentWalkerIndex] : null;
            if(!curStep) {
                document.getElementById('stage-val').innerText = "完成購物";
                document.getElementById('alert-text').innerHTML = `<i class="fas fa-check-double text-green-400"></i> <span>已順利抵達收銀台，購物導航結束。</span>`;
                document.getElementById('promo-trigger-zone').innerHTML = '';
                return;
            }

            document.getElementById('stage-val').innerText = curStep.isLastSeg ? "前往結帳" : `前往: ${curStep.targetItem.name}`;
            
            let walkerX = currentWalkerIndex < globalNavigationPath.length ? globalNavigationPath[currentWalkerIndex].x : endPos.x;
            let walkerY = currentWalkerIndex < globalNavigationPath.length ? globalNavigationPath[currentWalkerIndex].y : endPos.y;

            items.forEach(item => {
                if (selectedIds.has(item.id)) {
                    const isAdjacent = (Math.abs(walkerX - item.x) + Math.abs(walkerY - item.y)) === 1;
                    const shelfCell = document.getElementById(`cell-${item.x}-${item.y}`);
                    
                    if (isAdjacent) {
                        shelfCell.classList.remove('shelf-orange');
                        shelfCell.classList.add('shelf-red-glow');
                        triggerContextAlert(item);
                    }
                }
            });
        }

        
        function addPromoHistory(item) {

            // 避免重複加入同一優惠
            promoHistory = promoHistory.filter(p => p.name !== item.name);

            // 最新優惠插入最前面
            promoHistory.unshift({
                name: item.name,
                promo: item.promo,
                icon: item.icon
            });

            renderPromoHistory();
        }

        function renderPromoHistory() {

            const box = document.getElementById('promo-history-box');
            const list = document.getElementById('promo-history-list');

            list.innerHTML = '';

            if (promoHistory.length === 0) {
                box.classList.add('hidden');
                return;
            }

            box.classList.remove('hidden');

            promoHistory.forEach((promo, index) => {

                const row = document.createElement('div');

                row.className =
                    "bg-amber-50 border border-amber-100 rounded-xl p-3 flex items-start gap-3";

                row.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center shrink-0">
                        <i class="fas ${promo.icon}"></i>
                    </div>

                    <div class="flex-1">
                        <div class="text-[10px] text-slate-400 font-bold mb-1">
                            優惠 ${index + 1}
                        </div>

                        <div class="text-sm font-bold text-slate-700">
                            ${promo.name}
                        </div>

                        <div class="text-xs text-slate-500 mt-1">
                            ${promo.promo}
                        </div>
                    </div>
                `;

                list.appendChild(row);
            });
        }
        function triggerContextAlert(item) {
            addPromoHistory(item);
            const alertTextContainer = document.getElementById('alert-text');

            const promoZone = document.getElementById('promo-trigger-zone');

            if (item.isDeli) {
                document.getElementById('alert-bar').className = "min-h-[50px] flex items-center justify-between bg-amber-500 text-slate-900 px-4 py-2 rounded-xl shadow-md border-l-8 border-red-600 font-bold";
                alertTextContainer.innerHTML = `<i class="fas fa-triangle-exclamation text-red-700 text-lg"></i> <span>請記得貼價錢！估價位置 - A區 (地圖最上方)</span>`;
            } else {
                document.getElementById('alert-bar').className = "min-h-[50px] flex items-center justify-between bg-slate-800 text-white px-4 py-2 rounded-xl shadow-md border-l-4 border-red-500";
                alertTextContainer.innerHTML = `<i class="fas fa-location-dot text-red-400"></i> <span>您已抵達【${item.name}】貨架旁。</span>`;
            }

            promoZone.innerHTML = `
                <button onclick="openPromoModal('${item.icon}', '${item.name}', '${item.promo}')" class="bg-amber-400 hover:bg-amber-500 text-slate-900 px-3 py-1.5 rounded-lg text-xs font-bold shadow-md flex items-center gap-1.5 active:scale-95 transition-all">
                    <i class="fas ${item.icon}"></i> <span>看此區優惠</span>
                </button>
            `;
        }

        function openPromoModal(icon, title, content) {
            document.getElementById('modal-icon').className = `fas ${icon}`;
            document.getElementById('modal-title').innerText = `${title} 現場即時促銷`;
            document.getElementById('modal-content').innerText = content;
            document.getElementById('promo-modal').classList.remove('hidden');
        }

                // 手機版按鈕控制前進
        document.getElementById('btn-next-step').onclick = () => {
            moveWalkerOneStep();
        };
        
        document.getElementById('btn-close-modal').onclick = () => {
            document.getElementById('promo-modal').classList.add('hidden');
        };

        window.onload = initMap;
    </script>
